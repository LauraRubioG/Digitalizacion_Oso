<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgia Charms | Carrito de Compra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header style="position: relative;">
    <div class="menu-hamburguesa" id="btn-hamburguesa">☰ Menú</div>
    <nav id="menu-principal">
        <a href="Index.html">Página Principal</a>
        <a href="Productos.html">Productos</a>
        <a href="Carrito.html">Carrito de compra</a>
    </nav>
</header>

<main>
    <section id="seccion-carrito">
        <h1 class="titulo-seccion">Tu Carrito de Compra</h1>

        <div class="contenedor-carrito">

            <div class="lista-productos" id="lista-carrito">

                <article class="item-carrito" id="item-1">
                    <img src="OsitoSinFondo.png" alt="Oso Oro 24k">
                    <div class="info-item">
                        <h3>Bear Oro 24k</h3>
                        <p class="precio-unitario" data-precio="48.40">Precio: 48.40 €</p>

                        <div class="controles-cantidad">
                            <button class="btn-cantidad restar">-</button>
                            <input type="number" class="input-cantidad" value="1" min="1" readonly>
                            <button class="btn-cantidad sumar">+</button>
                        </div>
                    </div>
                    <button class="btn-eliminar" title="Eliminar producto">🗑️ Eliminar</button>
                </article>

            </div>

            <aside class="resumen-pedido">
                <h2>Resumen del Pedido</h2>
                <div class="caja-precio">
                    <div class="linea-precio"><span>Subtotal (Base Imponible):</span> <span id="resumen-base">40.00 €</span></div>
                    <div class="linea-precio"><span>IVA (21%):</span> <span id="resumen-iva">8.40 €</span></div>
                    <div class="linea-precio"><span>Envío:</span> <span>Gratis</span></div>
                    <div class="precio-final" id="resumen-total">48.40 €</div>
                </div>
                <a href="#" class="btn-comprar-final" onclick="alert('¡Gracias por comprar en Nostalgia Charms!')">Tramitar Pedido</a>
            </aside>

        </div>
    </section>
</main>

<footer class="site-footer">
    <p class="footer-copy">&copy; 2026 Nostalgia Charms. Proyecto DAW.</p>
</footer>

<script>
    // --- 1. SCRIPT DEL MENÚ HAMBURGUESA ---
    const btnHamburguesa = document.getElementById('btn-hamburguesa');
    const menuPrincipal = document.getElementById('menu-principal');
    btnHamburguesa.addEventListener('click', () => {
        menuPrincipal.classList.toggle('activo');
    });

    // --- 2. SCRIPT DE LA LÓGICA DEL CARRITO ---
    // Obtenemos los elementos del DOM que vamos a modificar
    const btnSumar = document.querySelector('.sumar');
    const btnRestar = document.querySelector('.restar');
    const inputCantidad = document.querySelector('.input-cantidad');
    const btnEliminar = document.querySelector('.btn-eliminar');
    const itemCarrito = document.getElementById('item-1');

    // Elementos del resumen de precios
    const txtBase = document.getElementById('resumen-base');
    const txtIva = document.getElementById('resumen-iva');
    const txtTotal = document.getElementById('resumen-total');

    // Precio base sin IVA de 1 unidad (según tu ejercicio anterior)
    const precioBaseUnidad = 40.00;

    // Función que recalcula todo según la cantidad actual
    function actualizarPrecios() {
        let cantidad = parseInt(inputCantidad.value); // Leemos el número del input

        // Cálculos matemáticos (Tema 14)
        let totalBase = precioBaseUnidad * cantidad;
        let totalIva = totalBase * 0.21;
        let totalFinal = totalBase + totalIva;

        // Actualizamos el HTML formateando a 2 decimales (.toFixed(2))
        txtBase.innerText = totalBase.toFixed(2) + " €";
        txtIva.innerText = totalIva.toFixed(2) + " €";
        txtTotal.innerText = totalFinal.toFixed(2) + " €";
    }

    // Evento al pulsar el botón de SUMAR (+)
    btnSumar.addEventListener('click', () => {
        let cantidadActual = parseInt(inputCantidad.value);
        inputCantidad.value = cantidadActual + 1; // Sumamos 1
        actualizarPrecios(); // Recalculamos
    });

    // Evento al pulsar el botón de RESTAR (-)
    btnRestar.addEventListener('click', () => {
        let cantidadActual = parseInt(inputCantidad.value);
        if (cantidadActual > 1) { // Evitamos que baje de 1
            inputCantidad.value = cantidadActual - 1; // Restamos 1
            actualizarPrecios(); // Recalculamos
        }
    });

    // Evento al pulsar ELIMINAR
    btnEliminar.addEventListener('click', () => {
        // Borramos visualmente el producto
        itemCarrito.style.display = 'none';
        // Ponemos los precios a cero
        txtBase.innerText = "0.00 €";
        txtIva.innerText = "0.00 €";
        txtTotal.innerText = "0.00 €";
    });
</script>
</body>
</html>
